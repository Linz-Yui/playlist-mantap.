<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist Spesial</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /* Warna khas Spotify */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #1DB954; margin-bottom: 30px; }
        .playlist-container {
            width: 100%;
            max-width: 400px;
        }
        .music-card {
            background: #181818;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: background 0.3s;
            border: 1px solid #282828;
        }
        .music-card:hover {
            background: #282828;
            border-color: #1DB954;
        }
        .info { margin-left: 15px; }
        .title { font-weight: bold; display: block; font-size: 1.1rem; }
        .artist { color: #b3b3b3; font-size: 0.9rem; }
        .icon { font-size: 1.5rem; color: #1DB954; }
    </style>
</head>
<body>

    <h1>For You ✨</h1>
    <p style="color: #b3b3b3;">Pilih lagu buat didengerin bareng:</p>

    <div class="playlist-container">
        <a href="https://open.spotify.com/track/4C1K2L0N60X6KxZkZ6Z0Z6" class="music-card">
            <span class="icon">🎵</span>
            <div class="info">
                <span class="title">Iqro</span>
                <span class="artist">Raim Laode</span>
            </div>
        </a>

        <a href="https://open.spotify.com/track/2S69NqE5I02P867Zf4x8Yp" class="music-card">
            <span class="icon">🎵</span>
            <div class="info">
                <span class="title">Remaja</span>
                <span class="artist">HIVI!</span>
            </div>
        </a>

        <a href="https://open.spotify.com/track/6p0C0M2N0V6O6XyZkZ6Z0Z" class="music-card">
            <span class="icon">🎵</span>
            <div class="info">
                <span class="title">Apalah (Arti Menunggu)</span>
                <span class="artist">Raisa</span>
            </div>
        </a>

        <a href="https://open.spotify.com/track/30p0M0N0V6O6XyZkZ6Z0Z6" class="music-card">
            <span class="icon">🎵</span>
            <div class="info">
                <span class="title">Peri Cintaku</span>
                <span class="artist">Ziva Magnolia</span>
            </div>
        </a>
    </div>

</body>
</html>
